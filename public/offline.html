<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2d6a4f" />
    <title>Интернэт холболтгүй · Цагийн Залбирал</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: 'Noto Sans', system-ui, -apple-system, sans-serif;
        background: #fafaf9;
        color: #292524;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0a; color: #e7e5e4; }
      }
      main {
        max-width: 420px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        background: #2d6a4f;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 40px;
        font-weight: 700;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 12px;
        font-weight: 600;
      }
      p {
        font-size: 1rem;
        margin: 0 0 24px;
        line-height: 1.6;
        opacity: 0.8;
      }
      button {
        background: #2d6a4f;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 1rem;
        font-family: inherit;
        cursor: pointer;
        min-height: 44px;
      }
      button:hover { background: #245c43; }
      button:focus-visible { outline: 2px solid #2d6a4f; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">✝</div>
      <h1>Интернэт холболтгүй байна</h1>
      <p>Сүлжээнд холбогдоход алдаа гарлаа. Холболтоо шалгаад дахин оролдоно уу.</p>
      <button type="button" onclick="location.reload()">Дахин оролдох</button>
    </main>
  </body>
</html>
